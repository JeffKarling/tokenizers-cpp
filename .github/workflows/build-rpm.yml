name: Build and Publish RPM

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:42

    steps:
      - name: Install dependencies
        run: |
          dnf install -y rpm-build rpmlint git-core gcc-c++ cmake rust cargo tar

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare rpmbuild environment
        run: |
          mkdir -p rpmbuild/{SOURCES,SPECS,RPMS,SRPMS,BUILD}
          # Create source tarball with submodules, renaming the root folder to match version 0.1.0
          cd ..
          tar --exclude='tokenizers-cpp/rpmbuild' \
              --exclude='tokenizers-cpp/.git' \
              --transform 's/^tokenizers-cpp/tokenizers-cpp-0.1.0/' \
              -czf tokenizers-cpp/rpmbuild/SOURCES/tokenizers-cpp-0.1.0.tar.gz \
              tokenizers-cpp
          cd tokenizers-cpp
          # Copy spec to SPECS directory
          cp tokenizers-cpp.spec rpmbuild/SPECS/

      - name: Build RPM packages
        run: |
          rpmbuild --define "_topdir $(pwd)/rpmbuild" -ba rpmbuild/SPECS/tokenizers-cpp.spec

      - name: Upload RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokenizers-cpp-rpm
          path: |
            rpmbuild/RPMS/x86_64/*.rpm

      - name: Publish Release Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rpmbuild/RPMS/x86_64/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
